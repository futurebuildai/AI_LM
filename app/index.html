<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00FFA3" />
  <meta name="description" content="AI_LM — AI Load Management & Compliance for Building Materials" />

  <!-- Google Fonts: Outfit (UI) & JetBrains Mono (Data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <title>AI_LM | Load Management &amp; Compliance</title>
</head>

<body>
  <style>
    body {
      background-color: #0A0B10;
      margin: 0;
      font-family: 'Outfit', sans-serif;
    }

    .initial-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }

    .logo-container {
      width: 80px;
      height: 80px;
      position: relative;
      margin-bottom: 20px;
    }

    .spinner {
      position: absolute;
      inset: -10px;
      border: 4px solid rgba(255, 255, 255, 0.05);
      border-top-color: #00FFA3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex;
      align-items: baseline;
      gap: 2px;
    }

    .accent {
      color: #00FFA3;
      font-weight: 300;
      letter-spacing: 0.2em;
    }
  </style>
  <div id="root">
    <div class="initial-loader">
      <div class="logo-container">
        <div class="spinner"></div>
        <svg style="position:absolute;inset:0;width:100%;height:100%;color:white" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="24" width="36" height="20" rx="2" stroke="currentColor" stroke-width="4" />
          <path d="M42 30 H52 L58 38 V44 H42" stroke="currentColor" stroke-width="4" stroke-linejoin="round" fill="none" />
          <circle cx="18" cy="48" r="4" fill="#00FFA3" />
          <circle cx="48" cy="48" r="4" fill="#00FFA3" />
        </svg>
      </div>
      <div class="brand">AI<span class="accent">LM</span></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
